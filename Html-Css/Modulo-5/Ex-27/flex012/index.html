<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexible box</title>
    <style>
        .conteiner{
            background-color: salmon;

            display: flex;
            flex-flow: row nowrap;
        }

        .item{
            background-color: aqua;
            border: 1px solid black;
            text-align: center;
        }

        #a{
            /* flex-grow: 0; */
            /* flex-shrink: 1; */
            flex: 0 1 150px; /*shorthand e recomendado*/
        }

        #b{
            flex-grow: 1;
            flex-shrink: 2;
            flex-basis: 150px;
        }
        #c{
            flex-grow: 2;
            flex-shrink: 0;
            flex-basis: auto;
            /*flex: 2 0 auto; /*shorthand*/
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="a">a</div>
        <div class="item" id="b">b</div>
        <div class="item" id="c">c</div>
    </div>
</body>
</html>
